<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马车资源预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            flex-direction: column;
        }

        h1 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .info {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preview-box {
            text-align: center;
        }

        .preview-box h3 {
            color: #d4af37;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .image-wrapper {
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            display: inline-block;
        }

        .image-wrapper.dark {
            background: #0a0a0a;
        }

        .image-wrapper.checker {
            background-image: 
                linear-gradient(45deg, #333 25%, transparent 25%),
                linear-gradient(-45deg, #333 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #333 75%),
                linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #1a1a1a;
        }

        img {
            max-width: 400px;
            max-height: 400px;
            display: block;
        }

        .specs {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
        }

        .back-link {
            margin-top: 40px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1> 马车资源预览</h1>
    <p class="info">维多利亚时代四轮马车 | 透明底 PNG</p>
    
    <div class="container">
        <div class="preview-box">
            <h3>透明底版本（RGBA）</h3>
            <div class="image-wrapper checker">
                <img src="assets_demo/carriage_full_alpha.png" alt="马车透明底版本">
            </div>
            <p class="specs">1024×1024 RGBA</p>
        </div>

        <div class="preview-box">
            <h3>深色背景效果</h3>
            <div class="image-wrapper dark">
                <img src="assets_demo/carriage_full_alpha.png" alt="马车深色背景效果">
            </div>
            <p class="specs">透明底 + 深色背景</p>
        </div>

        <div class="preview-box">
            <h3>浅色背景效果</h3>
            <div class="image-wrapper">
                <img src="assets_demo/carriage_full_alpha.png" alt="马车浅色背景效果">
            </div>
            <p class="specs">透明底 + 浅色背景</p>
        </div>
    </div>

    <a href="godot_assets_demo.html" class="back-link">← 返回场景预览</a>
</body>
</html>
